steps:
  # Build backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/babyguide-backend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/babyguide-backend:latest"
      - ./backend

  # Push backend image
  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/babyguide-backend"

  # Build frontend
  - name: "node:20-slim"
    id: build-frontend
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        npm ci
        VITE_BACKEND_URL=$$BACKEND_URL \
        VITE_BACKEND_WS=$$BACKEND_WS \
        npm run build

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    args:
      - gcloud
      - run
      - deploy
      - babyguide-backend
      - --image=gcr.io/$PROJECT_ID/babyguide-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed

  # Deploy frontend to Firebase Hosting
  - name: "node:20-slim"
    id: deploy-frontend
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN

substitutions:
  _BACKEND_URL: "https://babyguide-backend-xxxx-uc.a.run.app"
  _BACKEND_WS: "wss://babyguide-backend-xxxx-uc.a.run.app"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/backend-url/versions/latest
      env: BACKEND_URL
    - versionName: projects/$PROJECT_ID/secrets/backend-ws/versions/latest
      env: BACKEND_WS

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
